name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    if: "github.event_name == 'pull_request' || github.event.before != '0000000000000000000000000000000000000000'"
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install dependencies
        run: mise run install
      - name: Build
        run: mise run build:agent-kit
      - name: Test
        run: mise run test:agent-kit
      - name: Format check
        run: mise run format-check:agent-kit
      - name: Lint
        run: mise run lint:agent-kit

  publish-rc:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: "github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - run: mise run install
      - name: Publish RC
        run: mise run publish-rc:agent-kit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
