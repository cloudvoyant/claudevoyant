<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Top pins -->
  <rect x="15" y="3" width="6" height="10" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <rect x="27" y="3" width="6" height="10" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <rect x="39" y="3" width="6" height="10" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <!-- Bottom pins -->
  <rect x="15" y="51" width="6" height="10" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <rect x="27" y="51" width="6" height="10" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <rect x="39" y="51" width="6" height="10" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <!-- Left pins -->
  <rect x="3" y="15" width="10" height="6" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <rect x="3" y="27" width="10" height="6" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <rect x="3" y="39" width="10" height="6" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <!-- Right pins -->
  <rect x="51" y="15" width="10" height="6" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <rect x="51" y="27" width="10" height="6" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <rect x="51" y="39" width="10" height="6" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <!-- Chip body -->
  <rect x="13" y="13" width="38" height="38" rx="4" fill="#ede9ff" stroke="#5555ff" stroke-width="2.5"/>
  <!-- Corner accent squares -->
  <rect x="16" y="16" width="6" height="6" rx="1" fill="#5555ff"/>
  <rect x="42" y="16" width="6" height="6" rx="1" fill="#5555ff"/>
  <rect x="16" y="42" width="6" height="6" rx="1" fill="#5555ff"/>
  <rect x="42" y="42" width="6" height="6" rx="1" fill="#5555ff"/>
  <!-- Crosshair circle -->
  <circle cx="32" cy="32" r="7" fill="none" stroke="#5555ff" stroke-width="2"/>
  <!-- Crosshair lines -->
  <line x1="32" y1="25" x2="32" y2="27" stroke="#5555ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="37" x2="32" y2="39" stroke="#5555ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="32" x2="27" y2="32" stroke="#5555ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="32" x2="39" y2="32" stroke="#5555ff" stroke-width="2" stroke-linecap="round"/>
</svg>
